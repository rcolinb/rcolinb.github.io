<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — R.C. Blenis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #F5F0E8;
    --cream: #FAF7F2;
    --parchment: #EDE7DA;
    --clay: #A0522D;
    --clay-light: #B8734A;
    --clay-faint: rgba(160, 82, 45, 0.08);
    --charcoal: #2C2C2C;
    --ink: #1A1A1A;
    --stone: #6B6560;
    --mist: #9E9890;
    --serif: 'EB Garamond', 'Georgia', serif;
    --sans: 'Source Sans 3', 'Helvetica Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 18px; }

  body {
    font-family: var(--sans);
    background-color: var(--cream);
    color: var(--charcoal);
    line-height: 1.7;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  .container::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--clay-faint) 0%, transparent 70%);
    filter: blur(60px);
    pointer-events: none;
  }

  .error-code {
    font-family: var(--serif);
    font-size: 5rem;
    font-weight: 400;
    color: var(--parchment);
    letter-spacing: 0.1em;
    line-height: 1;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  .error-line {
    width: 40px;
    height: 1px;
    background: var(--clay);
    margin-bottom: 2rem;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .error-message {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-style: italic;
    color: var(--stone);
    max-width: 400px;
    line-height: 1.8;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease 0.5s both;
  }

  .home-link {
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mist);
    text-decoration: none;
    padding: 0.7rem 1.8rem;
    border: 1px solid var(--parchment);
    transition: all 0.4s ease;
    display: inline-block;
    animation: fadeUp 0.8s ease 0.7s both;
  }

  .home-link:hover {
    color: var(--clay);
    border-color: var(--clay-light);
    background: rgba(160, 82, 45, 0.04);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    html { font-size: 16px; }
    .error-code { font-size: 3.5rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <div class="error-line"></div>
    <p class="error-message">
      Nothing here but quiet.<br>
      The page you're looking for has moved, or never was.
    </p>
    <a class="home-link" href="/">Back to the beginning</a>
  </div>
</body>
</html>
